<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Elegida | Panel de Administración</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f8fafc 0%,#eef2ff 100%);margin:0;padding:24px;color:#0f172a;min-height:100vh}
        .layout{display:grid;grid-template-columns:1fr;gap:24px;max-width:1600px;margin:0 auto}
        .layout-con-carrito{display:grid;grid-template-columns:1fr 480px;gap:24px}
        .panel{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-radius:28px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,0.03);border:1px solid rgba(255,255,255,0.8)}
        .nav-tabs{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
        .tab-btn{padding:12px 28px;border-radius:9999px;border:none;cursor:pointer;font-weight:600;background:white;transition:all 0.3s;font-size:14px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 1px 2px 0 rgba(0,0,0,0.05)}
        .tab-btn.active{background:#6366f1;color:white;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);transform:translateY(-1px)}
        .tab-btn:not(.active):hover{background:#f1f5f9;transform:translateY(-1px)}
        .btn-warning{background:#f59e0b;color:white}.btn-success{background:#10b981;color:white}.btn-danger{background:#ef4444;color:white}.btn-info{background:#3b82f6;color:white}.btn-manual{background:#8b5cf6;color:white}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .card{background:white;border-radius:36px;padding:20px;text-align:center;transition:all 0.3s;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 1px 2px 0 rgba(0,0,0,0.05);border:1px solid #eef2ff}
        .card:hover{transform:translateY(-4px);box-shadow:0 20px 25px -5px rgba(0,0,0,0.1)}
        .card img{width:100%;height:180px;object-fit:cover;border-radius:20px;margin-bottom:12px;background:#f1f5f9}
        .card h4{font-size:16px;font-weight:700;margin:8px 0}
        .precio-producto{font-size:20px;font-weight:800;margin:8px 0;color:#6366f1}
        .precio-mayor{font-size:12px;color:#10b981;margin-top:-4px;margin-bottom:8px}
        .variante-select{width:100%;padding:12px 16px;border-radius:40px;border:1px solid #e2e8f0;background:white;font-size:14px;margin-bottom:8px;cursor:pointer}
        .cantidad-selector{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;background:#f1f5f9;border-radius:9999px;padding:4px;width:fit-content;margin-left:auto;margin-right:auto}
        .cantidad-btn{width:36px;height:36px;border-radius:9999px;border:none;background:white;cursor:pointer;font-weight:700;font-size:18px;color:#6366f1}
        .cantidad-btn:hover{background:#6366f1;color:white}
        .cantidad-input{width:60px;text-align:center;font-size:16px;font-weight:600;border:1px solid #e2e8f0;background:white;border-radius:12px;padding:6px}
        .btn-add{width:100%;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:40px;padding:12px;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-add:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(99,102,241,0.3)}
        .cart-item{background:white;border-radius:20px;padding:12px;margin-bottom:12px;display:flex;gap:12px;align-items:center;border:1px solid #eef2ff}
        .cart-item.mayorista-applied{border-left:4px solid #10b981;background:linear-gradient(90deg,#f0fdf4 0%,#ffffff 100%)}
        .cart-img{width:52px;height:52px;border-radius:20px;object-fit:cover;background:#f1f5f9}
        .cart-info{flex:1}.cart-info h4{font-size:14px;font-weight:700;margin-bottom:4px}.cart-info p{font-size:11px;color:#64748b}
        .cart-controls{display:flex;align-items:center;gap:8px;background:#f1f5f9;padding:4px 12px;border-radius:40px}
        .cart-controls button{border:none;background:none;cursor:pointer;font-weight:800;font-size:18px;width:28px;color:#6366f1}
        .cart-precio{font-weight:700;min-width:80px;text-align:right}
        .btn-eliminar-cart{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:18px}.btn-eliminar-cart:hover{color:#ef4444}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
        .form-label{font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;display:block}
        .required:after{content:" *";color:#ef4444}
        input,select,textarea{padding:12px 16px;border-radius:20px;border:1px solid #e2e8f0;width:100%;font-family:inherit;font-size:14px;transition:all 0.3s;background:#fafcff}
        input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
        textarea{resize:vertical;min-height:70px}
        .total-container{background:linear-gradient(135deg,#ffffff,#f8fafc);border-radius:36px;padding:24px;text-align:center;margin-top:20px;border:1px solid #eef2ff}
        .total-amount{font-size:42px;font-weight:800;color:#6366f1;margin:10px 0}
        .btn-confirm{background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;width:100%;padding:16px;border-radius:40px;font-weight:700;cursor:pointer;font-size:16px;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px}
        .btn-confirm:hover{transform:translateY(-2px);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        .hidden{display:none}
        .empty-cart{text-align:center;color:#94a3b8;padding:48px;background:#f8fafc;border-radius:20px}
        .pago-tabs,.entrega-tabs{display:flex;gap:10px;margin:12px 0}
        .pago-btn,.entrega-btn{flex:1;padding:12px;border-radius:40px;border:1px solid #e2e8f0;background:white;cursor:pointer;font-weight:600;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px}
        .pago-btn.active,.entrega-btn.active{background:#6366f1;color:white;border-color:#6366f1}
        .stock-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:40px;background:#f1f5f9;color:#475569}
        .stock-bajo{background:#fee2e2;color:#991b1b}
        .btn-print{background:#6366f1;color:white;border:none;padding:6px 12px;border-radius:40px;cursor:pointer;font-size:11px;font-weight:600;margin:0 4px;display:inline-flex;align-items:center;gap:6px}
        .acciones-venta{display:flex;gap:8px;flex-wrap:wrap}
        .producto-card{background:white;border-radius:28px;padding:20px;margin-bottom:20px;border:1px solid #e2e8f0}
        .producto-header{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
        .producto-imagen{flex-shrink:0}.producto-imagen img{width:100px;height:100px;object-fit:cover;border-radius:20px;background:#f1f5f9;border:1px solid #e2e8f0}
        .producto-info{flex:1;min-width:200px}
        .drag-handle{cursor:grab;color:#cbd5e1;font-size:24px;padding:0 10px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-content{background:white;border-radius:28px;padding:28px;max-width:800px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #e2e8f0}
        .modal-header h3{font-size:20px;font-weight:700;color:#6366f1}
        .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#94a3b8}
        .modal-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
        .config-section{background:white;border-radius:28px;padding:24px;margin-bottom:24px;border:1px solid #e2e8f0}
        .config-section h3{color:#6366f1;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .logo-preview{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;background:#f8fafc;border-radius:20px;margin-bottom:20px}
        .logo-preview img{max-width:200px;max-height:80px;object-fit:contain;border-radius:12px;border:1px solid #e2e8f0;padding:8px;background:white}
        .logo-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
        .modo-option{flex:1;padding:16px;border-radius:16px;background:#f8fafc;border:2px solid #e2e8f0;text-align:center;cursor:pointer;transition:all 0.3s}
        .modo-option.active{border-color:#10b981;background:#f0fdf4}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px}
        .stat-card{background:white;border-radius:24px;padding:20px;text-align:center;border:1px solid #eef2ff}
        .stat-card i{font-size:32px;margin-bottom:8px}.stat-card h3{font-size:28px;font-weight:800;margin:8px 0;color:#6366f1}
        .toast-notification{position:fixed;bottom:24px;right:24px;background:#10b981;color:white;padding:12px 24px;border-radius:40px;font-weight:600;z-index:1002;animation:slideIn 0.3s ease-out}
        .toast-notification.error{background:#ef4444}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .ventas-buscador{margin-bottom:16px}.ventas-buscador input{padding:12px;border-radius:20px;border:1px solid #e2e8f0;width:100%}
        .btn-excel{background:#10b981;color:white}.btn-grafico{background:#8b5cf6;color:white}
        .notif-badge{position:absolute;top:-5px;right:-5px;background:#ef4444;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
        .notif-panel{position:absolute;top:50px;right:0;width:350px;max-height:450px;background:white;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.15);overflow:hidden;z-index:100}
        .notif-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #e2e8f0}
        .notif-list{max-height:380px;overflow-y:auto}
        .notif-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer}
        .notif-item.no-leida{background:#eef2ff}
        .notif-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .notif-icon.pedido{background:#dbeafe;color:#3b82f6}.notif-icon.stock{background:#fee2e2;color:#ef4444}.notif-icon.venta{background:#d1fae5;color:#10b981}
        .notif-content{flex:1}.notif-title{font-weight:600;font-size:13px;margin-bottom:4px}.notif-desc{font-size:11px;color:#64748b}.notif-time{font-size:10px;color:#94a3b8;margin-top:4px}
        .estado-badge{padding:4px 12px;border-radius:9999px;font-size:12px;font-weight:600;display:inline-block}
        .estado-pendiente{background:#fef3c7;color:#b45309}.estado-confirmado{background:#d1fae5;color:#065f46}.estado-abonado{background:#dbeafe;color:#1e40af}.estado-enviado{background:#e0e7ff;color:#3730a3}.estado-entregado{background:#dcfce7;color:#166534}.estado-cancelado{background:#fee2e2;color:#991b1b}
        .perfil-card{background:#f8fafc;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
        .perfil-card h5{font-size:14px;margin-bottom:4px}.perfil-card p{font-size:11px;color:#64748b}
        .variantes-panel{background:#f8fafc;border-radius:20px;padding:20px;margin-top:20px}
        .variante-item{background:white;border-radius:16px;padding:16px;border:1px solid #e2e8f0;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
        .btn-toggle-variantes{margin-top:12px;padding:10px 20px;background:#6366f1;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:8px;transition:all 0.2s}
        .btn-toggle-variantes:hover{background:#4f46e5}
        @media(max-width:1024px){.layout-con-carrito{grid-template-columns:1fr}body{padding:16px}}
        @media(max-width:768px){.form-row{grid-template-columns:1fr}.producto-header{flex-direction:column}}
    </style>
</head>
<body>
<div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f8fafc 0%,#eef2ff 100%)">
    <div style="background:white;border-radius:28px;padding:40px;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,0.08);text-align:center">
        <div style="font-size:48px;margin-bottom:16px">🏪</div>
        <h2 style="color:#6366f1;margin-bottom:8px">Casa Elegida</h2>
        <p style="color:#64748b;margin-bottom:24px">Panel de Administración</p>
        <input type="text" id="login-usuario" placeholder="Usuario" style="width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:16px;margin-bottom:12px;font-size:14px">
        <input type="password" id="login-password" placeholder="Contraseña" style="width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:16px;margin-bottom:20px;font-size:14px">
        <button onclick="loginAdmin()" style="width:100%;padding:16px;background:#6366f1;color:white;border:none;border-radius:50px;font-weight:700;cursor:pointer;font-size:15px">Ingresar</button>
        <p id="login-error" style="color:#ef4444;margin-top:12px;font-size:13px"></p>
    </div>
</div>
<div id="main-screen" style="display:none">
    <div class="nav-tabs">
        <button id="t-v" class="tab-btn active" onclick="tab('v')"><i class="fas fa-cash-register"></i> Ventas</button>
        <button id="t-r" class="tab-btn" onclick="tab('r')"><i class="fas fa-list"></i> Listado</button>
        <button id="t-a" class="tab-btn" onclick="tab('a')"><i class="fas fa-boxes"></i> Stock</button>
        <button id="t-dash" class="tab-btn" onclick="tab('dash')"><i class="fas fa-chart-pie"></i> Dashboard</button>
        <button id="t-c" class="tab-btn" onclick="tab('c')"><i class="fas fa-sliders-h"></i> Config</button>
        <button id="t-retiro" class="tab-btn btn-warning" onclick="tab('retiro')"><i class="fas fa-qrcode"></i> Retirar</button>
        <button id="t-p" class="tab-btn" onclick="tab('p')"><i class="fas fa-shopping-cart"></i> Pedidos</button>
        <button id="t-perfiles" class="tab-btn btn-info" onclick="tab('perfiles')"><i class="fas fa-users-cog"></i> Perfiles</button>
        <button id="t-logs" class="tab-btn btn-info" onclick="tab('logs')"><i class="fas fa-history"></i> Logs</button>
        <div style="margin-left:auto;position:relative">
            <button class="tab-btn" onclick="toggleNotificaciones()" style="position:relative"><i class="fas fa-bell"></i><span id="notif-count" class="notif-badge" style="display:none">0</span></button>
            <div id="notif-panel" class="notif-panel" style="display:none"><div class="notif-header"><h4>Notificaciones</h4><button onclick="marcarTodasLeidas()" style="background:none;border:none;color:#6366f1;cursor:pointer;font-size:12px">Todas leídas</button></div><div id="notif-list" class="notif-list"></div></div>
        </div>
        <button class="tab-btn" onclick="abrirModalCambiarPassword()"><i class="fas fa-key"></i></button>
        <button class="tab-btn btn-danger" onclick="cerrarSesionAdmin()"><i class="fas fa-sign-out-alt"></i> Salir</button>
    </div>
    <div id="main-container" class="layout"></div>
    <div id="v-cart" class="panel hidden" style="position:fixed;right:24px;top:120px;width:480px;max-height:calc(100vh - 140px);overflow-y:auto;z-index:50">
        <h3 style="margin-top:0;margin-bottom:20px"><i class="fas fa-shopping-cart"></i> Pedido Actual</h3>
        <div id="cart-items" style="max-height:320px;overflow-y:auto;margin-bottom:20px"></div>
        <label style="font-weight:600;margin-bottom:8px;display:block"><i class="fas fa-truck"></i> Entrega</label>
        <div class="entrega-tabs"><button id="l-local" class="entrega-btn active" onclick="setLog('local')"><i class="fas fa-store"></i> Retiro</button><button id="l-envio" class="entrega-btn" onclick="setLog('envio')"><i class="fas fa-shipping-fast"></i> Envío</button></div>
        <div id="form-envio" class="hidden"><div class="form-envio-completo"><div class="form-row"><div><label class="form-label required">Nombre</label><input type="text" id="env-nombre"></div><div><label class="form-label required">DNI</label><input type="text" id="env-dni"></div></div><div class="form-row"><div><label class="form-label required">Teléfono</label><input type="tel" id="env-celular"></div><div><label>Email</label><input type="email" id="env-email"></div></div><div class="form-row"><div><label class="form-label required">CP</label><input type="text" id="env-cp"></div><div><label class="form-label required">Provincia</label><select id="env-provincia"><option value="">Seleccionar</option><option>Buenos Aires</option><option>CABA</option><option>Córdoba</option></select></div></div><div class="form-row"><div><label class="form-label required">Localidad</label><input type="text" id="env-localidad"></div><div><label class="form-label required">Domicilio</label><input type="text" id="env-domicilio"></div></div><div><label>Notas</label><textarea id="env-notas"></textarea></div></div></div>
        <label style="font-weight:600;margin:16px 0 8px;display:block"><i class="fas fa-credit-card"></i> Pago</label>
        <div class="pago-tabs"><button id="p-ef" class="pago-btn active" onclick="setMetodo('efectivo')"><i class="fas fa-money-bill-wave"></i> Efectivo</button><button id="p-tr" class="pago-btn" onclick="setMetodo('transferencia')"><i class="fas fa-exchange-alt"></i> Transf.</button><button id="p-mx" class="pago-btn" onclick="setMetodo('mixto')"><i class="fas fa-hand-holding-usd"></i> Mixto</button></div>
        <div class="total-container"><div>Total a pagar</div><div id="total-txt" class="total-amount">$0</div><button class="btn-confirm" onclick="checkout()"><i class="fas fa-check-circle"></i> CONFIRMAR VENTA</button></div>
    </div>
</div>
<script>
let adminToken = localStorage.getItem('adminToken');
let adminActual = null;
let productos = [], carrito = [], metodoPago = 'efectivo', logistica = 'local', totalVenta = 0;
let ventasHistorial = [], pedidosTienda = [], categorias = [], metodosEnvio = [];
let varianteSeleccionada = {}, configuracion = {}, mayoristaHabilitado = false, mayoristaModo = 'cantidad';
let notificaciones = [], notificacionesNoLeidas = 0;
const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });

function mostrarToast(msg, error=false) { const t = document.createElement('div'); t.className = `toast-notification ${error?'error':''}`; t.innerHTML = `<i class="fas ${error?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatearNumero(n) { if(!n) return '0'; return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function desformatearNumero(t) { if(!t) return 0; return parseInt(t.toString().replace(/\./g,''))||0; }
function sanitizarUrl(url) { if(!url) return 'https://via.placeholder.com/50'; if(url.startsWith('/uploads/')||url.startsWith('http')) return url; return 'https://via.placeholder.com/50'; }
async function safeFetch(url, options={}) { if (adminToken) options.headers = { ...options.headers, 'Authorization': `Bearer ${adminToken}` }; try { const res = await fetch(url, options); if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || `HTTP ${res.status}`); return await res.json(); } catch(e) { mostrarToast(e.message, true); throw e; } }

async function loginAdmin() { const usuario = document.getElementById('login-usuario').value.trim(); const password = document.getElementById('login-password').value; if (!usuario || !password) { document.getElementById('login-error').textContent = 'Completá todos los campos'; return; } try { const res = await fetch('/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario,password}) }); const data = await res.json(); if (data.success) { localStorage.setItem('adminToken', data.token); adminToken = data.token; adminActual = data.perfil; document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-screen').style.display = 'block'; iniciarPanel(); } else { document.getElementById('login-error').textContent = data.error || 'Error'; } } catch(e) { document.getElementById('login-error').textContent = 'Error de conexión'; } }
function cerrarSesionAdmin() { localStorage.removeItem('adminToken'); adminToken = null; adminActual = null; location.reload(); }
function iniciarPanel() { tab('v'); cargarCarritoGuardado(); setLog('local'); setMetodo('efectivo'); setInterval(cargarNotificaciones, 30000); cargarNotificaciones(); }
if (adminToken) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-screen').style.display = 'block'; iniciarPanel(); }

ilitado=d.mayorista.habilitado||false; mayoristaModo=d.mayorista.modo||'cantidad'; document.getElementById('mayoristaCantidad').value=d.mayorista.valorCantidad||3; document.getElementById('mayoristaMonto').value=formatearNumero(d.mayorista.valorMonto||80000); selectMayoristaModo(mayoristaModo); if(!mayoristaHabilitado){ document.getElementById('mayoristaPanel').style.display='none'; const btn=document.getElementById('btnMayoristaToggle'); btn.innerHTML='<i class="fas fa-toggle-off"></i> Desactivado'; btn.style.background='#64748b'; } } if(d.metodosEnvio&&document.getElementById('metodos-envio-lista')) document.getElementById('metodos-envio-lista').value=d.metodosEnvio.join('\n'); } catch(e){} }

function renderProductosVenta() { const g=document.getElementById('grid-prods'); if(!g) return; g.innerHTML=''; productos.forEach(p=>{ if(!p.variantes?.length) p.variantes=[{nombre:"Unica",stock:0,foto:""}]; if(!varianteSeleccionada[p.id]) varianteSeleccionada[p.id]=0; let v=p.variantes[varianteSeleccionada[p.id]]; g.innerHTML+=`<div class="card" data-nombre="${p.nombre.toLowerCase()}" data-id="${p.id}"><div><span class="stock-badge ${v.stock<=5?'stock-bajo':''}"><i class="fas fa-box"></i> Stock: ${v.stock}</span></div><img src="${sanitizarUrl(v.foto)}" onerror="this.src='https://via.placeholder.com/180'" style="width:100%;height:180px;object-fit:cover;border-radius:20px"><h4>${escapeHtml(p.nombre)}</h4><div class="precio-producto">${fmt.format(p.precio)}</div>${p.precioMayor>0?`<div class="precio-mayor">Mayorista: ${fmt.format(p.precioMayor)}</div>`:''}<select class="variante-select" onchange="cambiarVariante(${p.id},this.value)">${p.variantes.map((x,i)=>`<option value="${i}">${escapeHtml(x.nombre)} (${x.stock})</option>`).join('')}</select><div class="cantidad-selector"><button class="cantidad-btn" onclick="cambiarCantidad(${p.id},-1)">-</button><input type="number" id="q-${p.id}" value="1" min="1" max="${v.stock}" class="cantidad-input"><button class="cantidad-btn" onclick="cambiarCantidad(${p.id},1)">+</button></div><button class="btn-add" onclick="addAlCarrito(${p.id})" ${v.stock===0?'disabled':''}>${v.stock===0?'Sin Stock':'Agregar'}</button></div>`; }); }
function cambiarVariante(id,idx){ varianteSeleccionada[id]=parseInt(idx); const p=productos.find(x=>x.id==id); if(!p)return; document.getElementById(`q-${id}`).max=p.variantes[idx].stock; }
function cambiarCantidad(id,d){ const i=document.getElementById('q-'+id); if(i) i.value=Math.max(1,Math.min((parseInt(i.value)||1)+d,parseInt(i.max)||999)); }

async function addAlCarrito(id){
    let p = productos.find(x => x.id == id);
    if (!p) return;
    let idx = varianteSeleccionada[id] || 0;
    let v = p.variantes[idx];
    if (!v) return;
    let c = parseInt(document.getElementById('q-' + id).value);
    
    // ✅ Verificar stock en tiempo real desde el servidor
    try {
        const res = await fetch('/verificar-stock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productoId: id, varianteNombre: v.nombre })
        });
        const data = await res.json();
        if (data.stock !== undefined) {
            v.stock = data.stock;
            const badge = document.querySelector(`.card[data-id="${id}"] .stock-badge`);
            if (badge) {
                badge.innerHTML = `<i class="fas fa-box"></i> Stock: ${v.stock}`;
                badge.classList.toggle('stock-bajo', v.stock <= 5);
            }
        }
    } catch(e) {}
    
    if (v.stock < c) {
        mostrarToast('❌ Stock insuficiente. Disponible: ' + v.stock, true);
        return;
    }
    
    let e = carrito.find(i => i.pId === id && i.vNom === v.nombre && !i.esManual);
    if (e) {
        if (v.stock < e.cant + c) {
            mostrarToast('❌ Stock insuficiente', true);
            return;
        }
        e.cant += c;
    } else {
        carrito.push({
            pId: id, pNom: p.nombre, vNom: v.nombre, vFoto: v.foto || '',
            precio: p.precio, precioMayor: p.precioMayor || 0, cant: c, esManual: false
        });
    }
    
    calcularPreciosMayoristaEnVivo();
    renderCart();
    localStorage.setItem('pos_carrito', JSON.stringify(carrito));
    mostrarToast('✅ Agregado');
}
function calcularPreciosMayoristaEnVivo(){ if(!mayoristaHabilitado){ carrito.forEach(i=>{ if(i.precioOriginal){ i.precio=i.precioOriginal; delete i.precioOriginal; } }); renderCart(); return; } const cantTotal=carrito.reduce((s,i)=>s+i.cant,0); const montoTotal=carrito.reduce((s,i)=>s+(i.precioOriginal||i.precio)*i.cant,0); const cantReq=parseInt(document.getElementById('mayoristaCantidad')?.value)||3; const montoReq=desformatearNumero(document.getElementById('mayoristaMonto')?.value)||80000; let cumple=false; if(mayoristaModo==='cantidad') cumple=cantTotal>=cantReq; else if(mayoristaModo==='monto') cumple=montoTotal>=montoReq; else cumple=cantTotal>=cantReq&&montoTotal>=montoReq; carrito.forEach(i=>{ if(i.esManual)return; const p=productos.find(x=>x.id==i.pId); if(!p||!p.precioMayor)return; if(cumple){ if(!i.precioOriginal) i.precioOriginal=i.precio; i.precio=p.precioMayor; } else if(i.precioOriginal){ i.precio=i.precioOriginal; delete i.precioOriginal; } }); renderCart(); }

function renderCart(){ let d=document.getElementById('cart-items'); if(!d)return; totalVenta=0; d.innerHTML=''; if(!carrito.length) d.innerHTML='<div class="empty-cart"><i class="fas fa-shopping-cart"></i><br>Vacío</div>'; else carrito.forEach((it,i)=>{ totalVenta+=it.precio*it.cant; d.innerHTML+=`<div class="cart-item ${it.precioOriginal&&it.precio<it.precioOriginal?'mayorista-applied':''}"><img src="${sanitizarUrl(it.vFoto)}" class="cart-img"><div class="cart-info"><h4>${escapeHtml(it.pNom)} ${it.precioOriginal&&it.precio<it.precioOriginal?'<span style="background:#10b981;color:white;padding:2px 6px;border-radius:10px;font-size:9px;margin-left:4px">MAY</span>':''}</h4><p>${escapeHtml(it.vNom)} • ${fmt.format(it.precio)} c/u</p></div><div class="cart-controls"><button onclick="modificarCantidadCarrito(${i},-1)">-</button><span>${it.cant}</span><button onclick="modificarCantidadCarrito(${i},1)">+</button></div><div class="cart-precio"><strong>${fmt.format(it.precio*it.cant)}</strong></div><button class="btn-eliminar-cart" onclick="eliminarDelCarrito(${i})"><i class="fas fa-trash-alt"></i></button></div>`; }); document.getElementById('total-txt').innerHTML=fmt.format(totalVenta); }
function modificarCantidadCarrito(i,d){ if(!carrito[i])return; let nc=carrito[i].cant+d; if(nc<1){eliminarDelCarrito(i);return;} carrito[i].cant=nc; calcularPreciosMayoristaEnVivo(); renderCart(); localStorage.setItem('pos_carrito',JSON.stringify(carrito)); }
function eliminarDelCarrito(i){ carrito.splice(i,1); calcularPreciosMayoristaEnVivo(); renderCart(); localStorage.setItem('pos_carrito',JSON.stringify(carrito)); }

async function checkout(){ if(!carrito.length){ mostrarToast('Carrito vacío',true); return; } let cd={nombre:'Mostrador'}; if(logistica==='envio'){ let n=document.getElementById('env-nombre').value.trim(),d=document.getElementById('env-dni').value.trim(),c=document.getElementById('env-celular').value.trim(); if(!n||!d||!c){mostrarToast('Completá datos',true);return;} cd={nombre:n,dni:d,celular:c}; } let data=await safeFetch('/confirmar-venta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({carrito,pago:{total:totalVenta,metodo:metodoPago},logistica,cliente:cd,mayoristaConfig:{habilitado:mayoristaHabilitado}})}); if(data.success){ mostrarToast(`✅ Venta ${data.ventaId}`); carrito=[]; renderCart(); localStorage.removeItem('pos_carrito'); cargar(); cargarVentas(); } }

function renderAdmin(){

    productos.forEach(p=>{

        const card=document.createElement('div'); card.className='producto-card'; card.setAttribute('data-id',p.id);
        card.innerHTML=`
        <div class="producto-header">
            <div class="drag-handle"><i class="fas fa-grip-vertical"></i></div>
            <div class="producto-imagen"><img src="${sanitizarUrl(p.variantes[0]?.foto)}" style="width:100px;height:100px;object-fit:cover;border-radius:20px" onerror="this.src='https://via.placeholder.com/100'"></div>

function toggleVariantes(id) {
    const panel = document.getElementById(`variantes-panel-${id}`);
    const btn = document.getElementById(`btn-toggle-${id}`);
    if (!panel || !btn) return;
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        btn.innerHTML = `<i class="fas fa-layer-group"></i> Ocultar Variantes <i class="fas fa-chevron-up"></i>`;
    } else {
        panel.style.display = 'none';
        const p = productos.find(x => x.id == id);
        btn.innerHTML = `<i class="fas fa-layer-group"></i> Ver/Editar Variantes (${p?.variantes?.length || 0}) <i class="fas fa-chevron-down"></i>`;
    }
}

function agregarVariante(pid){
    const p = productos.find(x => x.id == pid);
    if (!p) return;
    if (p.variantes.length >= 30) { mostrarToast('Máximo 30 variantes', true); return; }
    p.variantes.push({ nombre: `Variante ${p.variantes.length + 1}`, stock: 0, foto: '' });
    const container = document.getElementById(`variantes-container-${pid}`);
    const btn = document.getElementById(`btn-toggle-${pid}`);
    if (container) {
        const i = p.variantes.length - 1;
        container.innerHTML += `
        <div class="variante-item">
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                <img src="https://via.placeholder.com/50" id="img-var-${pid}-${i}" style="width:50px;height:50px;border-radius:12px;object-fit:cover;cursor:pointer;background:#f1f5f9" onerror="this.src='https://via.placeholder.com/50'" onclick="document.getElementById('input-var-foto-${pid}-${i}').click()">
                <input type="file" id="input-var-foto-${pid}-${i}" accept="image/*" style="display:none" onchange="subirFotoVariante(this,'${pid}',${i})">
            </div>
            <div style="flex:1;min-width:120px"><input type="text" id="vn-${pid}-${i}" value="${escapeHtml(p.variantes[i].nombre)}" placeholder="Nombre variante" style="padding:10px;border-radius:12px;font-size:13px;font-weight:500"></div>
            <div style="width:80px"><input type="number" id="vs-${pid}-${i}" value="${p.variantes[i].stock}" placeholder="Stock" min="0" style="padding:10px;border-radius:12px;font-size:13px;text-align:center"></div>
            <button onclick="eliminarVariante('${pid}',${i})" style="background:#fee2e2;color:#ef4444;border:none;padding:8px 12px;border-radius:12px;cursor:pointer;font-size:12px"><i class="fas fa-trash"></i></button>
        </div>`;
    }
    if (btn) btn.innerHTML = `<i class="fas fa-layer-group"></i> Ocultar Variantes (${p.variantes.length}) <i class="fas fa-chevron-up"></i>`;
    mostrarToast('✅ Variante agregada. Guardá el producto.');
}

function eliminarVariante(pid, idx){
    const p = productos.find(x => x.id == pid);
    if (!p) return;
    if (p.variantes.length <= 1) { mostrarToast('Mínimo 1 variante', true); return; }
    p.variantes.splice(idx, 1);
    const container = document.getElementById(`variantes-container-${pid}`);
    const btn = document.getElementById(`btn-toggle-${pid}`);
    if (container) {
        container.innerHTML = p.variantes.map((v, i) => `
        <div class="variante-item">
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                <img src="${sanitizarUrl(v.foto)}" id="img-var-${pid}-${i}" style="width:50px;height:50px;border-radius:12px;object-fit:cover;cursor:pointer;background:#f1f5f9" onerror="this.src='https://via.placeholder.com/50'" onclick="document.getElementById('input-var-foto-${pid}-${i}').click()">
                <input type="file" id="input-var-foto-${pid}-${i}" accept="image/*" style="display:none" onchange="subirFotoVariante(this,'${pid}',${i})">
            </div>
            <div style="flex:1;min-width:120px"><input type="text" id="vn-${pid}-${i}" value="${escapeHtml(v.nombre)}" placeholder="Nombre variante" style="padding:10px;border-radius:12px;font-size:13px;font-weight:500"></div>
            <div style="width:80px"><input type="number" id="vs-${pid}-${i}" value="${v.stock}" placeholder="Stock" min="0" style="padding:10px;border-radius:12px;font-size:13px;text-align:center"></div>
            ${p.variantes.length > 1 ? `<button onclick="eliminarVariante('${pid}',${i})" style="background:#fee2e2;color:#ef4444;border:none;padding:8px 12px;border-radius:12px;cursor:pointer;font-size:12px"><i class="fas fa-trash"></i></button>` : ''}
        </div>`).join('');
    }
    if (btn) btn.innerHTML = `<i class="fas fa-layer-group"></i> Ocultar Variantes (${p.variantes.length}) <i class="fas fa-chevron-up"></i>`;
    mostrarToast('✅ Variante eliminada. Guardá el producto.');
}

function aplicarStockATodas(pid){const p=productos.find(x=>x.id==pid);if(!p?.variantes?.length)return;const m=document.createElement('div');m.className='modal active';m.innerHTML=`<div class="modal-content" style="max-width:400px"><div class="modal-header"><h3>Aplicar Stock</h3><button onclick="this.closest('.modal').remove()">&times;</button></div><div class="modal-body"><p style="margin-bottom:16px">Stock para las ${p.variantes.length} variantes</p><input type="number" id="stock-global" value="0" min="0" style="font-size:24px;text-align:center;padding:16px;border-radius:16px"></div><div class="modal-footer"><button onclick="this.closest('.modal').remove()" class="tab-btn">Cancelar</button><button onclick="aplicarStockGlobal('${pid}')" class="btn-confirm">Aplicar</button></div></div>`;document.body.appendChild(m);}
function aplicarStockGlobal(pid){const s=parseInt(document.getElementById('stock-global').value)||0;const p=productos.find(x=>x.id==pid);if(!p)return;p.variantes.forEach(v=>v.stock=s);const container=document.getElementById(`variantes-container-${pid}`);if(container){p.variantes.forEach((v,i)=>{const inp=document.getElementById(`vs-${pid}-${i}`);if(inp)inp.value=s;});}document.querySelector('.modal.active')?.remove();mostrarToast(`✅ Stock ${s} aplicado`);}
function actualizarSubcategorias(pid){const catId=document.getElementById(`cat-${pid}`).value;const cat=categorias.find(c=>c.id==parseInt(catId));const sel=document.getElementById(`subcat-${pid}`);if(!sel)return;let h='<option value="">Sin subcategoría</option>';if(cat?.subcategorias?.length)h+=cat.subcategorias.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');sel.innerHTML=h;}
async function subirFotoVariante(i,pid,idx){if(!i.files?.[0])return;const f=new FormData();f.append('foto',i.files[0]);try{const d=await safeFetch('/subir-imagen',{method:'POST',body:f});if(d.url){productos.find(x=>x.id==pid).variantes[idx].foto=d.url;document.getElementById(`img-var-${pid}-${idx}`).src=d.url;mostrarToast('✅ Imagen subida (guardá el producto)');}}catch(e){}}

async function saveEdit(id){
    const nombre=document.getElementById(`en-${id}`)?.value?.trim();
    const precio=parseFloat(document.getElementById(`ep-${id}`)?.value);
    const precioMayor=parseFloat(document.getElementById(`epm-${id}`)?.value)||0;
    const categoriaId=parseInt(document.getElementById(`cat-${id}`)?.value)||null;
    const subcategoria=document.getElementById(`subcat-${id}`)?.value||null;
    const descripcion=document.getElementById(`desc-${id}`)?.value?.trim()||'';
    if(!nombre){mostrarToast('Nombre requerido',true);return;}
    if(!precio||precio<=0){mostrarToast('Precio mayor a 0',true);return;}
    if(precioMayor>0&&precioMayor>=precio){mostrarToast('Precio mayorista menor al regular',true);return;}
    const p=productos.find(x=>x.id==id);if(!p)return;
    const variantes=[];
    const container=document.getElementById(`variantes-container-${id}`);
    if(container){
        for(let i=0;i<container.children.length;i++){
            const nom=document.getElementById(`vn-${id}-${i}`)?.value?.trim();
            const stk=parseInt(document.getElementById(`vs-${id}-${i}`)?.value)||0;
            if(nom) variantes.push({nombre:nom,stock:stk,foto:p.variantes[i]?.foto||''});
        }
    }
    if(!variantes.length){mostrarToast('Al menos 1 variante',true);return;}
    p.nombre=nombre;p.precio=precio;p.precioMayor=precioMayor;p.categoriaId=categoriaId;p.subcategoria=subcategoria;p.descripcion=descripcion;p.variantes=variantes;
    await safeFetch('/guardar-producto',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    mostrarToast('✅ Producto guardado');
}

async function confirmarPedidoWeb(id){if(!confirm('¿Confirmar?'))return;await safeFetch('/tienda/confirmar-pedido',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pedidoId:id})});mostrarToast('✅ Confirmado');cargarPedidosTienda();}
async function marcarAbonado(id){await safeFetch('/tienda/marcar-abonado',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pedidoId:id})});mostrarToast('✅ Abonado');cargarPedidosTienda();}
async function cancelarPedidoAdmin(id){if(!confirm('¿Cancelar?'))return;await safeFetch('/tienda/cancelar-pedido-admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pedidoId:id})});mostrarToast('✅ Cancelado');cargarPedidosTienda();}
async function verificarPINRetiro(){const p=document.getElementById('pin-retiro-input').value.trim();if(p.length!==4){mostrarToast('PIN de 4 dígitos',true);return;}const d=await safeFetch('/tienda/verificar-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:p})});if(d.success){document.getElementById('pin-retiro-resultado').innerHTML=`<div style="background:#d1fae5;padding:20px;border-radius:16px"><h4>✅ ${d.pedido.id}</h4><p>Cliente: ${d.pedido.cliente.nombre} ${d.pedido.cliente.apellido}</p><p>Total: ${fmt.format(d.pedido.total)}</p><button onclick="confirmarRetiro('${d.pedido.id}','${p}')" class="btn-confirm">Confirmar</button></div>`;}else document.getElementById('pin-retiro-resultado').innerHTML='<div style="color:#ef4444">❌ PIN no encontrado</div>';}
async function confirmarRetiro(id,pin){await safeFetch('/tienda/retirar-pedido',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pedidoId:id,pin})});mostrarToast('✅ Entregado');cargarPedidosTienda();}
async function cargarDashboard(){try{const d=await safeFetch('/admin/estadisticas-avanzadas',{method:'POST'});const c=document.getElementById('estadisticas-avanzadas');if(!c)return;c.innerHTML=`<div class="stats-grid"><div class="stat-card"><i class="fas fa-calendar-day" style="color:#6366f1"></i><h3>${fmt.format(d.ventasHoy)}</h3><p>Hoy (${d.cantidadHoy})</p></div><div class="stat-card"><i class="fas fa-calendar-alt" style="color:#10b981"></i><h3>${fmt.format(d.ventasMes)}</h3><p>Mes (${d.cantidadMes})</p></div><div class="stat-card"><i class="fas fa-chart-line" style="color:#f59e0b"></i><h3>${fmt.format(d.ticketPromedio)}</h3><p>Ticket Promedio</p></div><div class="stat-card"><i class="fas fa-users" style="color:#8b5cf6"></i><h3>${d.totalClientes}</h3><p>Clientes</p></div><div class="stat-card"><i class="fas fa-boxes" style="color:#ec4899"></i><h3>${d.totalProductos}</h3><p>Productos</p></div><div class="stat-card"><i class="fas fa-shopping-cart" style="color:#06b6d4"></i><h3>${d.pedidosPendientes}</h3><p>Pendientes</p></div></div><div class="config-section" style="margin-top:24px"><h4><i class="fas fa-exclamation-triangle" style="color:#ef4444"></i> Alertas</h4><p>📦 Pedidos pendientes: <strong>${d.pedidosPendientes}</strong></p><p>🚫 Agotados: <strong>${d.productosAgotados}</strong></p></div>`;await cargarEstadisticasVendedor();}catch(e){}}
async function cargarEstadisticasVendedor(){try{const d=await safeFetch('/admin/estadisticas-vendedor',{method:'POST'});const c=document.getElementById('estadisticas-vendedor');if(!c||!d.lista?.length)return;c.innerHTML='<h4><i class="fas fa-users"></i> Rendimiento</h4>'+d.lista.map(v=>`<div style="display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #e2e8f0"><span><i class="fas fa-user"></i> ${v.nombre}</span><span>🛒 ${v.ventas} | 📦 ${v.pedidos}</span></div>`).join('');}catch(e){}}
async function cargarPerfiles(){try{const d=await safeFetch('/admin/perfiles',{method:'POST'});const c=document.getElementById('lista-perfiles');if(!c)return;c.innerHTML=d.lista.map(p=>`<div class="perfil-card"><div><h5>${p.nombre} ${p.rol==='admin'?'👑':''}</h5><p>${p.usuario} | ${p.permisos.join(',')||'Sin permisos'} | ${p.activo?'✅':'❌'}</p></div><div>${p.rol!=='admin'?`<button onclick="togglePerfil('${p.id}',${!p.activo})" class="tab-btn ${p.activo?'btn-danger':'btn-success'}">${p.activo?'Desactivar':'Activar'}</button>`:''}</div></div>`).join('');}catch(e){}}
function abrirModalCrearPerfil(){ const m=document.createElement('div');m.className='modal active'; m.innerHTML=`<div class="modal-content" style="max-width:520px"><div class="modal-header"><h3 style="display:flex;align-items:center;gap:10px"><i class="fas fa-user-plus" style="color:#6366f1"></i> Nuevo Perfil</h3><button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button></div><div class="modal-body"><div style="background:#fef3c7;border-radius:16px;padding:16px;margin-bottom:20px;display:flex;gap:12px;align-items:center"><div style="background:#f59e0b;color:white;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-shield-alt"></i></div><div><p style="font-weight:700;color:#92400e;margin-bottom:4px">Verificación de Administrador</p><p style="font-size:12px;color:#92400e">Ingresá tu contraseña para autorizar</p></div></div><div style="margin-bottom:20px"><label style="font-size:13px;font-weight:600;color:#1e293b;margin-bottom:6px;display:block"><i class="fas fa-lock" style="color:#6366f1;width:20px"></i> Tu contraseña de Admin</label><input type="password" id="nuevo-perfil-admin-pass" placeholder="••••••••" style="width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:16px;font-size:14px"></div><div style="border-top:2px solid #f1f5f9;padding-top:20px;margin-bottom:20px"><p style="font-weight:700;color:#1e293b;margin-bottom:16px"><i class="fas fa-user" style="color:#6366f1;width:20px"></i> Datos del nuevo perfil</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px"><div><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px">Nombre</label><input type="text" id="nuevo-perfil-nombre" placeholder="Ej: Juan Pérez" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:14px;font-size:14px"></div><div><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px">Usuario</label><input type="text" id="nuevo-perfil-usuario" placeholder="Nombre de acceso" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:14px;font-size:14px"></div></div><div style="margin-bottom:16px"><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px">Contraseña</label><input type="password" id="nuevo-perfil-password" placeholder="Mínimo 6 caracteres" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:14px;font-size:14px"></div></div><div style="border-top:2px solid #f1f5f9;padding-top:20px"><p style="font-weight:700;color:#1e293b;margin-bottom:16px"><i class="fas fa-sliders-h" style="color:#6366f1;width:20px"></i> Permisos de acceso</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><label style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f8fafc;border-radius:14px;cursor:pointer;border:2px solid #e2e8f0;transition:all 0.2s" onmouseenter="this.style.borderColor='#6366f1';this.style.background='#eef2ff'" onmouseleave="this.style.borderColor='#e2e8f0';this.style.background='#f8fafc'"><input type="checkbox" id="perm-ventas" style="width:20px;height:20px;accent-color:#6366f1"><div><strong style="font-size:13px;color:#1e293b">Ventas</strong><p style="font-size:10px;color:#64748b;margin:0">Punto de venta</p></div></label><label style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f8fafc;border-radius:14px;cursor:pointer;border:2px solid #e2e8f0;transition:all 0.2s" onmouseenter="this.style.borderColor='#10b981';this.style.background='#f0fdf4'" onmouseleave="this.style.borderColor='#e2e8f0';this.style.background='#f8fafc'"><input type="checkbox" id="perm-stock" style="width:20px;height:20px;accent-color:#10b981"><div><strong style="font-size:13px;color:#1e293b">Stock</strong><p style="font-size:10px;color:#64748b;margin:0">Gestión de productos</p></div></label><label style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f8fafc;border-radius:14px;cursor:pointer;border:2px solid #e2e8f0;transition:all 0.2s" onmouseenter="this.style.borderColor='#3b82f6';this.style.background='#eff6ff'" onmouseleave="this.style.borderColor='#e2e8f0';this.style.background='#f8fafc'"><input type="checkbox" id="perm-pedidos" style="width:20px;height:20px;accent-color:#3b82f6"><div><strong style="font-size:13px;color:#1e293b">Pedidos Web</strong><p style="font-size:10px;color:#64748b;margin:0">Gestión de pedidos</p></div></label><label style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f8fafc;border-radius:14px;cursor:pointer;border:2px solid #e2e8f0;transition:all 0.2s" onmouseenter="this.style.borderColor='#f59e0b';this.style.background='#fef3c7'" onmouseleave="this.style.borderColor='#e2e8f0';this.style.background='#f8fafc'"><input type="checkbox" id="perm-config" style="width:20px;height:20px;accent-color:#f59e0b"><div><strong style="font-size:13px;color:#1e293b">Configuración</strong><p style="font-size:10px;color:#64748b;margin:0">Ajustes del sistema</p></div></label><label style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f8fafc;border-radius:14px;cursor:pointer;border:2px solid #e2e8f0;transition:all 0.2s" onmouseenter="this.style.borderColor='#8b5cf6';this.style.background='#ede9fe'" onmouseleave="this.style.borderColor='#e2e8f0';this.style.background='#f8fafc'"><input type="checkbox" id="perm-dashboard" style="width:20px;height:20px;accent-color:#8b5cf6"><div><strong style="font-size:13px;color:#1e293b">Dashboard</strong><p style="font-size:10px;color:#64748b;margin:0">Estadísticas</p></div></label></div></div></div><div class="modal-footer"><button onclick="this.closest('.modal').remove()" class="tab-btn">Cancelar</button><button onclick="crearPerfil()" class="btn-confirm">Crear Perfil</button></div></div>`;document.body.appendChild(m); }
async function crearPerfil(){ const ap=document.getElementById('nuevo-perfil-admin-pass').value,n=document.getElementById('nuevo-perfil-nombre').value.trim(),u=document.getElementById('nuevo-perfil-usuario').value.trim(),p=document.getElementById('nuevo-perfil-password').value,perms=[];if(document.getElementById('perm-ventas').checked)perms.push('ventas');if(document.getElementById('perm-stock').checked)perms.push('stock');if(document.getElementById('perm-pedidos').checked)perms.push('pedidos');if(document.getElementById('perm-config').checked)perms.push('config');if(document.getElementById('perm-dashboard').checked)perms.push('dashboard');if(!ap||!n||!u||!p){mostrarToast('Completá todos los campos',true);return;}const d=await safeFetch('/admin/crear-perfil',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminPassword:ap,usuario:u,password:p,nombre:n,permisos:perms})});if(d.success){mostrarToast('✅ Perfil creado');document.querySelector('.modal.active').remove();cargarPerfiles();}else mostrarToast(d.error,true); }
async function togglePerfil(id,activo){await safeFetch('/admin/editar-perfil',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,activo})});mostrarToast(activo?'✅ Activado':'🔒 Desactivado');cargarPerfiles();}
function abrirModalCambiarPassword(){ const m=document.createElement('div');m.className='modal active'; m.innerHTML=`<div class="modal-content" style="max-width:400px"><div class="modal-header"><h3><i class="fas fa-key"></i> Cambiar Contraseña</h3><button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button></div><div class="modal-body"><div style="margin-bottom:16px"><label>Contraseña actual</label><input type="password" id="pass-actual"></div><div style="margin-bottom:16px"><label>Contraseña nueva</label><input type="password" id="pass-nueva" placeholder="Mínimo 6 caracteres"></div></div><div class="modal-footer"><button onclick="this.closest('.modal').remove()" class="tab-btn">Cancelar</button><button onclick="cambiarPassword()" class="btn-confirm">Guardar</button></div></div>`;document.body.appendChild(m); }
async function cambiarPassword(){const a=document.getElementById('pass-actual').value,n=document.getElementById('pass-nueva').value;if(!a||!n)return mostrarToast('Completá ambos campos',true);if(n.length<6)return mostrarToast('Mínimo 6 caracteres',true);const d=await safeFetch('/admin/cambiar-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passwordActual:a,passwordNueva:n})});if(d.success){mostrarToast('✅ Contraseña actualizada');document.querySelector('.modal.active').remove();}else mostrarToast(d.error,true);}
function abrirBuscadorClientes(){ const m=document.createElement('div');m.className='modal active'; m.innerHTML=`<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3><i class="fas fa-search"></i> Buscar Clientes</h3><button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button></div><div class="modal-body"><input type="text" id="busqueda-cliente" placeholder="Buscar por nombre, DNI, email..." style="width:100%;padding:14px;border-radius:16px;border:2px solid #e2e8f0;margin-bottom:16px" onkeyup="buscarClientes()"><div id="resultado-clientes"></div></div></div>`;document.body.appendChild(m); }
async function buscarClientes(){const q=document.getElementById('busqueda-cliente').value.trim();if(q.length<2){document.getElementById('resultado-clientes').innerHTML='';return;}const d=await safeFetch('/admin/buscar-clientes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});document.getElementById('resultado-clientes').innerHTML=d.lista?.length?d.lista.map(c=>`<div style="background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:8px"><strong>${c.nombre} ${c.apellido}</strong><p style="font-size:12px;color:#64748b">DNI: ${c.dni||'-'} | ${c.email} | ${c.telefono||'-'}</p></div>`).join(''):'<p style="text-align:center;color:#94a3b8">Sin resultados</p>';}
async function exportarVentasCSV(){const r=await fetch('/admin/exportar-ventas',{method:'POST',headers:{'Authorization':`Bearer ${adminToken}`}});const b=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ventas.csv';a.click();mostrarToast('✅ Exportado');}
async function verEstadoCaja(){try{const d=await safeFetch('/admin/estado-caja',{method:'POST'});const c=document.getElementById('estado-caja');if(!c)return;if(!d.abierta)c.innerHTML=`<div class="config-section" style="margin-bottom:16px"><h4><i class="fas fa-cash-register"></i> Caja Cerrada</h4><button onclick="abrirCaja()" class="btn-confirm">🔓 Abrir Caja</button></div>`;else c.innerHTML=`<div class="config-section" style="margin-bottom:16px;border-color:#10b981"><h4 style="color:#10b981"><i class="fas fa-cash-register"></i> Caja Abierta</h4><p>Inicio: ${fmt.format(d.montoInicial)} | Ventas: ${fmt.format(d.totalVentas)}</p><button onclick="cerrarCaja()" class="btn-confirm" style="background:#ef4444">🔒 Cerrar Caja</button></div>`;}catch(e){}}
async function abrirCaja(){const m=prompt('Monto inicial ($):','0');if(m===null)return;await safeFetch('/admin/apertura-caja',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({montoInicial:parseFloat(m)||0})});mostrarToast('✅ Abierta');verEstadoCaja();}
async function cerrarCaja(){if(!confirm('¿Cerrar?'))return;const d=await safeFetch('/admin/cierre-caja',{method:'POST'});if(d.success)mostrarToast(`✅ Cerrada. ${d.resumen.cantidadVentas} ventas - ${fmt.format(d.resumen.totalVentas)}`);verEstadoCaja();}
async function cargarNotificaciones(){try{const d=await safeFetch('/notificaciones',{method:'POST'});notificaciones=d.lista||[];notificacionesNoLeidas=notificaciones.filter(n=>!n.leida).length;actualizarBadge();}catch(e){}}
function actualizarBadge(){const b=document.getElementById('notif-count');if(notificacionesNoLeidas>0){b.style.display='flex';b.textContent=notificacionesNoLeidas>9?'9+':notificacionesNoLeidas;}else b.style.display='none';}
function toggleNotificaciones(){const p=document.getElementById('notif-panel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')renderNotificaciones();}
function renderNotificaciones(){document.getElementById('notif-list').innerHTML=notificaciones.map(n=>`<div class="notif-item ${n.leida?'':'no-leida'}" onclick="leerNotif('${n.id}')"><div class="notif-icon ${n.tipo}"><i class="fas fa-${n.tipo==='pedido'?'shopping-cart':n.tipo==='stock'?'exclamation-triangle':'check-circle'}"></i></div><div class="notif-content"><div class="notif-title">${n.titulo}</div><div class="notif-desc">${n.descripcion}</div><div class="notif-time">${n.fecha}</div></div></div>`).join('');}
async function leerNotif(id){await safeFetch('/notificaciones/leer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});cargarNotificaciones();}
async function marcarTodasLeidas(){await safeFetch('/notificaciones/leer-todas',{method:'POST'});cargarNotificaciones();document.getElementById('notif-panel').style.display='none';}
async function cargarLogs(){ const filtro=document.getElementById('logs-filtro')?.value||''; const desde=document.getElementById('logs-desde')?.value||''; const hasta=document.getElementById('logs-hasta')?.value||''; try { const d=await safeFetch('/logs/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filtro,desde,hasta})}); const tbody=document.getElementById('logs-body'); if(tbody&&d.lista){ tbody.innerHTML=d.lista.map(l=>`<tr><td style="font-size:12px;white-space:nowrap">${l.fechaLocal||l.fecha}</td><td><strong>${l.admin||'Sistema'}</strong></td><td><span style="background:#eef2ff;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600">${l.accion}</span></td><td style="font-size:12px">${l.detalles||''}</td></tr>`).join(''); } } catch(e){} }
function cargarCarritoGuardado(){let g=localStorage.getItem('pos_carrito');if(g){try{carrito=JSON.parse(g);calcularPreciosMayoristaEnVivo();renderCart();}catch(e){carrito=[];}}}
function actualizarEstadisticasRapidas(){verEstadoCaja();}
</script>
</body>
</html>
