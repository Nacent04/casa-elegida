// ==================== NUEVAS FUNCIONES ====================

// ========== NOTIFICACIONES ==========
async function cargarNotificaciones() {
    try { const data = await safeFetch('/notificaciones', { method: 'POST' }); notificaciones = data.lista || []; notificacionesNoLeidas = notificaciones.filter(n => !n.leida).length; actualizarBadge(); } catch(e) {}
}

function actualizarBadge() {
    const badge = document.getElementById('notif-count');
    if (notificacionesNoLeidas > 0) { badge.style.display = 'flex'; badge.textContent = notificacionesNoLeidas > 9 ? '9+' : notificacionesNoLeidas; } 
    else { badge.style.display = 'none'; }
}

function toggleNotificaciones() {
    const panel = document.getElementById('notif-panel');
    if (panel.style.display === 'none') { renderNotificaciones(); panel.style.display = 'block'; } 
    else { panel.style.display = 'none'; }
}

function renderNotificaciones() {
    const list = document.getElementById('notif-list');
    if (!notificaciones.length) { list.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8">No hay notificaciones</div>'; return; }
    list.innerHTML = notificaciones.map(n => `
        <div class="notif-item ${n.leida ? '' : 'no-leida'}" onclick="marcarLeida('${n.id}')">
            <div class="notif-icon ${n.tipo}"><i class="fas fa-${n.tipo==='pedido'?'shopping-cart':n.tipo==='stock'?'exclamation-triangle':'check-circle'}"></i></div>
            <div class="notif-content"><div class="notif-title">${n.titulo}</div><div class="notif-desc">${n.descripcion}</div><div class="notif-time">${n.tiempo}</div></div>
        </div>
    `).join('');
}

async function marcarLeida(id) {
    await safeFetch('/notificaciones/leer', { method: 'POST', body: JSON.stringify({ id }) });
    const notif = notificaciones.find(n => n.id === id);
    if (notif && !notif.leida) { notif.leida = true; notificacionesNoLeidas--; actualizarBadge(); renderNotificaciones(); }
}

async function marcarTodasLeidas() {
    await safeFetch('/notificaciones/leer-todas', { method: 'POST' });
    notificaciones.forEach(n => n.leida = true); notificacionesNoLeidas = 0; actualizarBadge(); renderNotificaciones();
}

// ========== DASHBOARD ==========
async function cargarDashboard() {
    try { 
        const data = await safeFetch('/dashboard/stats', { method: 'POST' });
        document.getElementById('dash-kpis').innerHTML = `
            <div class="stat-card"><i class="fas fa-shopping-cart" style="color:#6366f1"></i><h3>${data.ventasHoy}</h3><p>Ventas Hoy</p></div>
            <div class="stat-card"><i class="fas fa-dollar-sign" style="color:#10b981"></i><h3>${fmt.format(data.totalHoy)}</h3><p>Total Hoy</p></div>
            <div class="stat-card"><i class="fas fa-chart-line" style="color:#f59e0b"></i><h3>${fmt.format(data.ticketPromedio)}</h3><p>Ticket Promedio</p></div>
            <div class="stat-card"><i class="fas fa-users" style="color:#8b5cf6"></i><h3>${data.clientesNuevos}</h3><p>Clientes Nuevos</p></div>`;
        new Chart(document.getElementById('chart-ventas-semana'), { type: 'line', data: { labels: data.ventasSemana.map(v => v.dia), datasets: [{ label: 'Ventas', data: data.ventasSemana.map(v => v.total), borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.1)', tension: 0.4, fill: true }] }, options: { plugins: { tooltip: { callbacks: { label: (ctx) => fmt.format(ctx.raw) } } } } });
        new Chart(document.getElementById('chart-productos-top'), { type: 'bar', data: { labels: data.productosTop.map(p => p.nombre), datasets: [{ label: 'Unidades vendidas', data: data.productosTop.map(p => p.cantidad), backgroundColor: '#10b981' }] } });
        document.getElementById('clientes-frecuentes').innerHTML = data.clientesTop.map(c => `<div style="display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #e2e8f0"><span><i class="fas fa-user"></i> ${c.nombre}</span><span><strong>${c.compras} compras</strong> - ${fmt.format(c.total)}</span></div>`).join('');
        new Chart(document.getElementById('chart-horarios'), { type: 'bar', data: { labels: data.horariosPico.map(h => h.hora + 'hs'), datasets: [{ label: 'Pedidos', data: data.horariosPico.map(h => h.cantidad), backgroundColor: '#f59e0b' }] } });
    } catch(e) {}
}

        document.getElementById('logs-body').innerHTML = data.lista.map(l => `<tr><td>${l.fechaLocal}</td><td>${l.admin}</td><td>${l.accion}</td><td><small>${l.detalles}</small></td><td>${l.ip}</td></tr>`).join('');

// ==================== TAB (ACTUALIZADA CON NUEVAS PESTAÑAS) ====================
function tab(t) {
    const container = document.getElementById('main-container'), cartPanel = document.getElementById('v-cart');
    if(t === 'v') { container.className = 'layout-con-carrito'; container.innerHTML = renderPaginaVentas(); cartPanel.classList.remove('hidden'); setTimeout(() => { cargar(); renderProductosVenta(); cargarVentas(); cargarMetodosEnvio(); actualizarEstadisticasRapidas(); cargarNotificaciones(); }, 100); }
    else if(t === 'r') { container.className = 'layout'; container.innerHTML = renderPaginaListadoVentas(); cartPanel.classList.add('hidden'); cargarVentas(); }
    else if(t === 'a') { container.className = 'layout'; container.innerHTML = renderPaginaGestionStock(); cartPanel.classList.add('hidden'); cargarCategorias(); setTimeout(() => cargar(), 100); }
    else if(t === 'dash') { container.className = 'layout'; container.innerHTML = renderPaginaDashboard(); cartPanel.classList.add('hidden'); setTimeout(() => cargarDashboard(), 100); }
    else if(t === 'c') { container.className = 'layout'; container.innerHTML = renderPaginaConfiguracion(); cartPanel.classList.add('hidden'); cargarConfiguracion(); cargarConfiguracionMayorista(); setTimeout(() => { if(document.getElementById('metodos-envio-lista')) { cargarMetodosEnvio(); document.getElementById('metodos-envio-lista').value = metodosEnvio.join('\n'); } }, 200); }
    else if(t === 'retiro') { container.className = 'layout'; container.innerHTML = `<div class="panel"><h3><i class="fas fa-qrcode"></i> Retirar Pedido</h3><div style="max-width:400px;margin:0 auto;text-align:center"><input type="text" id="pin-retiro-input" maxlength="4" placeholder="0000" style="font-size:48px;text-align:center;letter-spacing:24px;width:200px;margin:20px auto;padding:16px"><button onclick="verificarPINRetiro()" class="btn-confirm" style="width:auto;padding:16px 40px"><i class="fas fa-search"></i> Verificar</button><div id="pin-retiro-resultado" style="margin-top:20px"></div></div></div>`; cartPanel.classList.add('hidden'); }
    else if(t === 'p') { container.className = 'layout'; container.innerHTML = renderPaginaPedidosWeb(); cartPanel.classList.add('hidden'); cargarPedidosTienda(); }
    else if(t === 'logs') { container.className = 'layout'; container.innerHTML = renderPaginaLogs(); cartPanel.classList.add('hidden'); cargarLogs(); }
    document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(t==='retiro'?'t-retiro':`t-${t}`).classList.add('active');
}

// ==================== INICIALIZACIÓN ====================
function initKeyboardShortcuts() { document.addEventListener('keydown', e => { if(e.ctrlKey && e.key==='n') { e.preventDefault(); if(document.getElementById('v-a')) nuevoProd(); } if(e.ctrlKey && e.key==='f') { e.preventDefault(); document.getElementById('buscador')?.focus(); } if(e.key==='F1') { e.preventDefault(); mostrarToast('⌨️ Ctrl+N: Nuevo | Ctrl+F: Buscar | F12: Corte'); } if(e.key==='F12') { e.preventDefault(); corteCaja(); } if(e.ctrlKey && e.altKey && e.key==='m') { e.preventDefault(); toggleMayorista(); } if(e.ctrlKey && e.altKey && e.key==='d') { e.preventDefault(); toggleDarkMode(); } }); }
function cargarCarritoGuardado() { let g = localStorage.getItem('pos_carrito'); if(g) { carrito = JSON.parse(g); renderCart(); calcularPreciosMayoristaEnVivo(); } }
function cargarModoOscuroGuardado() { if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode'); }

window.onload = () => { 
    tab('v'); cargarCarritoGuardado(); setLog('local'); setMetodo('efectivo'); selectMayoristaModo('cantidad'); 
    cargarModoOscuroGuardado(); initKeyboardShortcuts(); mostrarToast('✅ Sistema listo - F1 para atajos');
    setInterval(cargarNotificaciones, 30000);
};
setInterval(verificarStockBajoNotificacion, 3600000);
