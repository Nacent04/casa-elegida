<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Blanquería Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #8B5E3C; --primary-dark: #6B4423; --bg-light: #FDF8F4; --success: #4CAF50; --danger: #F44336; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .register-container { max-width: 460px; width: 100%; }
        .register-card { background: white; border-radius: 28px; padding: 40px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), #A0714F); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; margin: 0 auto 16px; }
        .logo h2 { color: var(--primary); font-size: 24px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #3E2A1E; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #F0E6DC; border-radius: 16px; font-size: 14px; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,94,60,0.1); }
        .btn-register { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; }
        .btn-register:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-google { width: 100%; padding: 14px; background: white; color: #3E2A1E; border: 2px solid #F0E6DC; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; margin-bottom: 20px; }
        .btn-google:hover { background: #f8fafc; border-color: var(--primary); }
        .btn-google i { color: #DB4437; font-size: 18px; }
        .login-link { text-align: center; font-size: 14px; color: #7B6B5A; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 14px 20px; border-radius: 40px; font-weight: 600; z-index: 2000; animation: slideIn 0.3s; }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bed"></i></div>
                <h2>Crear Cuenta</h2>
                <p style="color: #7B6B5A; margin-top: 8px;">Registrate para realizar pedidos</p>
            </div>
            
            <form id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="nombre" placeholder="María" required>
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" id="apellido" placeholder="González" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Teléfono (opcional)</label>
                    <input type="tel" id="telefono" placeholder="3811234567">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-register"><i class="fas fa-user-plus"></i> Registrarse</button>
            </form>
            
            <a href="/auth/google" class="btn-google">
                <i class="fab fa-google"></i> Continuar con Google
            </a>
            
            <p class="login-link">¿Ya tenés cuenta? <a href="/login">Iniciá Sesión</a></p>
        </div>
    </div>
    <div id="toast-container"></div>
    <script>
        function mostrarToast(msg, error = false) {
            const t = document.createElement('div'); t.className = `toast ${error ? 'error' : ''}`;
            t.innerHTML = msg; document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const apellido = document.getElementById('apellido').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (password !== confirm) {
                return mostrarToast('Las contraseñas no coinciden', true);
            }
            if (password.length < 6) {
                return mostrarToast('La contraseña debe tener al menos 6 caracteres', true);
            }
            
            try {
                const res = await fetch('/auth/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, apellido, email, telefono, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    mostrarToast('✅ ¡Cuenta creada! Redirigiendo...');
                    setTimeout(() => window.location.href = '/tienda', 1000);
                } else {
                    mostrarToast(data.error || 'Error al registrarse', true);
                }
            } catch (e) {
                mostrarToast('Error de conexión', true);
            }
        });
    </script>
</body>
</html>
