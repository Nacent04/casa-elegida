<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Blanquería Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #8B5E3C; --primary-dark: #6B4423; --bg-light: #FDF8F4; --success: #4CAF50; --danger: #F44336; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { max-width: 420px; width: 100%; }
        .login-card { background: white; border-radius: 28px; padding: 40px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), #A0714F); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; margin: 0 auto 16px; }
        .logo h2 { color: var(--primary); font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #3E2A1E; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #F0E6DC; border-radius: 16px; font-size: 14px; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,94,60,0.1); }
        .password-header { display: flex; justify-content: space-between; align-items: center; }
        .forgot-link { font-size: 12px; color: var(--primary); text-decoration: none; }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-login:disabled { background: #CCC; cursor: not-allowed; transform: none; }
        .btn-google { width: 100%; padding: 14px; background: white; color: #3E2A1E; border: 2px solid #F0E6DC; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; margin-bottom: 20px; text-decoration: none; }
        .btn-google:hover { background: #f8fafc; border-color: var(--primary); }
        .btn-google i { color: #DB4437; font-size: 18px; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #9CA3AF; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #E5E7EB; }
        .register-link { text-align: center; font-size: 14px; color: #7B6B5A; }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #7B6B5A; text-decoration: none; font-size: 13px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 14px 20px; border-radius: 40px; font-weight: 600; z-index: 2000; animation: slideIn 0.3s; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .alert-error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .alert-success { background: #D1FAE5; color: #065F46; border: 1px solid #A7F3D0; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bed"></i></div>
                <h2>Bienvenido</h2>
                <p style="color: #7B6B5A; margin-top: 8px;">Iniciá sesión para continuar</p>
            </div>
            
            <!-- Mensaje de error si existe -->
            <div id="login-alert" style="display:none;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <div class="password-header">
                        <label>Contraseña</label>
                        <a href="/recuperar" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            
            <div class="divider">o continuá con</div>
            
            <button onclick="loginConGoogle()" class="btn-google" id="google-btn">
                <i class="fab fa-google"></i> Continuar con Google
            </button>
            
            <p class="register-link">¿No tenés cuenta? <a href="/registro">Registrate aquí</a></p>
            <p class="back-link"><a href="/tienda"><i class="fas fa-arrow-left"></i> Volver a la tienda</a></p>
        </div>
    </div>
    <div id="toast-container"></div>
    
    <script>
        // Obtener URL de retorno
        const urlParams = new URLSearchParams(window.location.search);
        let returnUrl = urlParams.get('return') || localStorage.getItem('returnUrl') || '/tienda';
        
        // Guardar en localStorage para persistencia
        if (returnUrl) {
            localStorage.setItem('returnUrl', returnUrl);
        } else {
            returnUrl = '/tienda';
        }
        
        console.log('URL de retorno:', returnUrl);
        
        function mostrarToast(msg, error = false) {
            const t = document.createElement('div'); 
            t.className = `toast ${error ? 'error' : ''}`;
            t.innerHTML = `<i class="fas ${error ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`; 
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }
        
        function mostrarAlerta(msg, tipo = 'error') {
            const alert = document.getElementById('login-alert');
            alert.style.display = 'block';
            alert.className = `alert alert-${tipo}`;
            alert.innerHTML = `<i class="fas fa-${tipo === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
        }
        
        function ocultarAlerta() {
            document.getElementById('login-alert').style.display = 'none';
        }
        
        // Verificar si ya hay sesión activa
        function verificarSesionExistente() {
            const token = localStorage.getItem('token');
            if (token) {
                // Verificar que el token sea válido
                fetch('/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(user => {
                    if (user && user.id) {
                        // Sesión válida, redirigir
                        console.log('Sesión activa encontrada, redirigiendo...');
                        window.location.href = returnUrl;
                    } else {
                        // Token inválido, limpiar
                        console.log('Token inválido, limpiando...');
                        localStorage.removeItem('token');
                        localStorage.removeItem('usuario');
                        localStorage.removeItem('returnUrl');
                    }
                })
                .catch(() => {
                    // Error al verificar, asumir que no hay sesión
                    localStorage.removeItem('token');
                    localStorage.removeItem('usuario');
                });
            }
        }
        
        // Verificar si viene de un callback de Google con token
        function verificarCallbackGoogle() {
            const token = urlParams.get('token');
            const usuario = urlParams.get('usuario');
            const error = urlParams.get('error');
            
            if (error) {
                mostrarAlerta('Error al iniciar sesión con Google. Intentá nuevamente.', 'error');
                // Limpiar URL
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }
            
            if (token) {
                console.log('Token recibido de Google, guardando...');
                
                // Guardar token
                localStorage.setItem('token', token);
                
                // Si viene usuario en URL, guardarlo
                if (usuario) {
                    try {
                        const userData = JSON.parse(decodeURIComponent(usuario));
                        localStorage.setItem('usuario', JSON.stringify(userData));
                        console.log('Usuario guardado:', userData);
                    } catch (e) {
                        console.error('Error al parsear datos de usuario:', e);
                    }
                }
                
                // También intentar obtener datos del usuario desde el servidor
                fetch('/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(userData => {
                    if (userData && userData.id) {
                        localStorage.setItem('usuario', JSON.stringify(userData));
                        console.log('Datos de usuario obtenidos del servidor:', userData);
                    }
                })
                .catch(err => {
                    console.error('Error al obtener datos del usuario:', err);
                })
                .finally(() => {
                    // Limpiar parámetros de URL
                    if (window.history.replaceState) {
                        const cleanUrl = window.location.pathname;
                        window.history.replaceState({}, document.title, cleanUrl);
                    }
                    
                    // Redirigir después de un breve delay
                    mostrarToast('✅ ¡Inicio de sesión exitoso!');
                    const finalReturnUrl = localStorage.getItem('returnUrl') || returnUrl;
                    localStorage.removeItem('returnUrl');
                    
                    setTimeout(() => {
                        window.location.href = finalReturnUrl;
                    }, 1000);
                });
            }
        }
        
        // Login tradicional con email/contraseña
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            ocultarAlerta();
            
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                mostrarAlerta('Completá todos los campos', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Ingresando...';
            
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Guardar datos de sesión
                    localStorage.setItem('token', data.token);
                    if (data.usuario) {
                        localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    }
                    
                    console.log('Login exitoso:', data.usuario);
                    mostrarToast('✅ ¡Bienvenido! Redirigiendo...');
                    
                    const finalReturnUrl = localStorage.getItem('returnUrl') || returnUrl;
                    localStorage.removeItem('returnUrl');
                    
                    setTimeout(() => {
                        window.location.href = finalReturnUrl;
                    }, 800);
                } else {
                    mostrarAlerta(data.error || 'Email o contraseña incorrectos', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';
                }
            } catch (e) {
                console.error('Error de conexión:', e);
                mostrarAlerta('Error de conexión. Verificá tu internet.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';
            }
        });
        
        // Login con Google
        function loginConGoogle() {
            const btn = document.getElementById('google-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner" style="border-color: rgba(0,0,0,0.2); border-top-color: #DB4437;"></span> Conectando...';
            
            // Guardar URL de retorno antes de redirigir
            const urlToSave = urlParams.get('return') || localStorage.getItem('returnUrl') || '/tienda';
            localStorage.setItem('returnUrl', urlToSave);
            console.log('Guardando returnUrl para Google:', urlToSave);
            
            // Redirigir a Google OAuth (usando función en lugar de enlace para asegurar que se guarde)
            setTimeout(() => {
                window.location.href = '/auth/google';
            }, 300);
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            // Primero verificar si hay callback de Google
            verificarCallbackGoogle();
            
            // Si no hay callback, verificar sesión existente
            if (!urlParams.get('token')) {
                verificarSesionExistente();
            }
            
            // Enfocar el campo de email
            setTimeout(() => {
                document.getElementById('email').focus();
            }, 500);
        });
        
        // También verificar al cargar la página (por si acaso)
        if (document.readyState === 'complete') {
            verificarCallbackGoogle();
        }
    </script>
</body>
</html>
